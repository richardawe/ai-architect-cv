name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:                       # redeploy after a CV is generated
    workflows: ["Generate Tailored CV"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Inject the OpenRouter key at build time so the static chat widget
      # can call the API directly from the browser.
      # chat-config.js is NOT committed to git — it only lives in the
      # deployed Pages artifact.
      - name: Write chat configuration
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CHAT_MODEL: ${{ vars.CHAT_MODEL }}
        run: |
          python3 - <<'PY'
          import os, json
          key   = os.environ.get("OPENROUTER_API_KEY", "")
          model = os.environ.get("CHAT_MODEL", "meta-llama/llama-3.1-8b-instruct:free")
          cfg = {
            "apiKey":  key,
            "model":   model,
            "baseUrl": "https://openrouter.ai/api/v1",
            "referer": "https://richardawe.github.io/ai-architect-cv",
          }
          js = "/* Generated by deploy.yml — do not commit */\nwindow.CHAT_CONFIG = " + json.dumps(cfg, indent=2) + ";\n"
          open("chat-config.js", "w").write(js)
          print("chat-config.js written")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
